name: Android CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test Flutter Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by AGP 8.x / Gradle 8.x) ───────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Flutter SDK ───────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'        # pin to a stable release
          channel: 'stable'
          cache: true

      # ── 4. Restore pub cache ─────────────────────────────────────────────────
      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_HOME }}/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ── 5. Install Flutter dependencies ──────────────────────────────────────
      - name: Install dependencies
        working-directory: nihongo_v7
        run: flutter pub get

      # ── 5b. Regenerate missing Android wrapper files (gradlew, gradle/) ──────
      # The repo was created without committing the gradle wrapper. This command
      # re-creates only the missing files without touching existing source code.
      - name: Ensure Android wrapper files exist
        working-directory: nihongo_v7
        run: flutter create --platforms android . --project-name nihongo_v7

      # ── 6. Analyze (lint) ────────────────────────────────────────────────────
      - name: Run Flutter analyze
        working-directory: nihongo_v7
        run: flutter analyze --no-fatal-infos

      # ── 7. Unit tests ────────────────────────────────────────────────────────
      # Guard: flutter test exits with code 1 when the test/ directory is absent.
      # This check runs tests when the directory exists, skips cleanly otherwise.
      - name: Run Flutter tests
        working-directory: nihongo_v7
        run: |
          if [ -d "test" ] && [ "$(ls -A test)" ]; then
            flutter test --no-pub
          else
            echo "No test directory found — skipping flutter test."
          fi

      # ── 8. Make gradlew executable ───────────────────────────────────────────
      # FIX: gradlew is not committed to the repo. Running `flutter build apk`
      # generates it automatically, so we let Flutter drive the full build
      # (steps 9 & 10 below) rather than touching gradlew directly.
      # The chmod step is kept as a no-op guard in case the file is later added.
      - name: Make gradlew executable
        working-directory: nihongo_v7/android
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
          else
            echo "gradlew not present — Flutter will generate it during build."
          fi

      # ── 9. Build debug APK ───────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: nihongo_v7
        run: flutter build apk --debug --no-pub

      # ── 10. Build release APK (unsigned) ─────────────────────────────────────
      - name: Build release APK
        working-directory: nihongo_v7
        run: flutter build apk --release --no-pub --obfuscate --split-debug-info=build/debug-info

      # ── 11. Upload debug APK ─────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: nihongo_v7/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      # ── 12. Upload release APK ───────────────────────────────────────────────
      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: nihongo_v7/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      # ── 13. Upload debug symbols ─────────────────────────────────────────────
      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: nihongo_v7/build/debug-info/
          retention-days: 14

  # ── Optional: release job (runs only on version tags) ──────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
