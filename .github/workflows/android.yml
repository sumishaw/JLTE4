name: Android CI

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Test Flutter Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ env.FLUTTER_HOME }}/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install dependencies
        working-directory: nihongo_v7
        run: flutter pub get

      - name: Ensure Android wrapper files exist
        working-directory: nihongo_v7
        run: |
          # Only regenerate if the gradle wrapper is genuinely absent.
          # Running `flutter create` unconditionally would overwrite our
          # pinned gradle-wrapper.properties with Flutter's bundled (older) version.
          if [ ! -f "android/gradle/wrapper/gradle-wrapper.properties" ]; then
            flutter create --platforms android . --project-name nihongo_v7
          else
            echo "Gradle wrapper already present — skipping flutter create."
          fi

      - name: Pin Kotlin version in root build.gradle
        working-directory: nihongo_v7/android
        run: |
          sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.9.24'/" build.gradle
          echo "Kotlin version after patch:"
          grep kotlin_version build.gradle || echo "(kotlin_version not found — may already be pinned)"

      - name: Run Flutter analyze
        working-directory: nihongo_v7
        run: flutter analyze --no-fatal-infos

      - name: Run Flutter tests
        working-directory: nihongo_v7
        run: |
          if [ -d "test" ] && [ "$(ls -A test)" ]; then
            flutter test --no-pub
          else
            echo "No test directory found — skipping flutter test."
          fi

      - name: Make gradlew executable
        working-directory: nihongo_v7/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: nihongo_v7
        run: flutter build apk --debug --no-pub

      - name: Build release APK
        working-directory: nihongo_v7
        run: flutter build apk --release --no-pub --obfuscate --split-debug-info=build/debug-info

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: nihongo_v7/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: nihongo_v7/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols
          path: nihongo_v7/build/debug-info/
          retention-days: 14

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: release-apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
